<div class="stats-row">
  <div class="stat-card">
    <mat-icon>sensors</mat-icon>
    <span class="stat-value">{{ capteurCount }}</span>
    <span class="stat-label">Capteurs</span>
  </div>

  <div class="stat-card">
    <mat-icon>thermostat</mat-icon>
    <span class="stat-value">{{ thermostatCount }}</span>
    <span class="stat-label">Thermostats</span>
  </div>

  <div class="stat-card" [class.alert-active]="unreadAlertsCount > 0">
    <mat-icon>notifications</mat-icon>
    <span class="stat-value">{{ unreadAlertsCount }}</span>
    <span class="stat-label">Alertes</span>
  </div>
</div>
